version: 2

models:
  - name: fct_metric_drift
    description: >
      Fact table of daily metric drift alerts. Each row is a
      metric/segment/date with a z-score-based severity classification
      and percentage deviation from the rolling average.
    columns:
      - name: drift_severity
        description: "critical (|z| >= 3), warning (|z| >= 2), watch (|z| >= 1.5), normal"
        tests:
          - accepted_values:
              arguments:
                values: ['critical', 'warning', 'watch', 'normal']
      - name: is_drift_alert
        description: True when drift_severity is not normal.
        tests:
          - not_null

  - name: fct_drift_alerts
    description: >
      Drift events only (severity != normal), enriched with day-over-day
      change and consecutive alert context.
    columns:
      - name: metric_date
        tests:
          - not_null
      - name: drift_severity
        tests:
          - accepted_values:
              arguments:
                values: ['critical', 'warning', 'watch']

  - name: fct_drift_insights
    description: >
      AI-generated plain-English explanations of each drift alert,
      powered by Snowflake Cortex COMPLETE.
    columns:
      - name: ai_insight
        description: LLM-generated explanation of the drift event.
        tests:
          - not_null
